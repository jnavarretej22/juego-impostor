<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Impostor - Mobile</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-x: hidden;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            padding: 20px;
            min-height: calc(100vh - 80px);
            animation: slideIn 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            flex: 1;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            color: white;
            border-radius: 0 0 30px 30px;
            margin: -20px -20px 20px -20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 600;
            font-size: 0.9em;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-weight: 700;
        }

        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-primary.btn-loading {
            background: linear-gradient(135deg, #a8f5a0 0%, #6fcf6f 100%);
            color: #1a6b1a;
            transform: scale(0.97);
            pointer-events: none;
            transition: all 0.15s ease;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            backdrop-filter: blur(10px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
        }

        .participant-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .theme-card {
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 1em;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-card.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            transform: scale(1.05);
        }

        .theme-card.random {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            color: white;
            border-color: #ffd89b;
            font-weight: 700;
        }

        .theme-card.random.selected {
            background: linear-gradient(135deg, #19547b 0%, #ffd89b 100%);
            transform: scale(1.08);
            box-shadow: 0 8px 20px rgba(25, 84, 123, 0.4);
        }

        .impostor-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px 0;
        }

        .impostor-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .impostor-number {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            min-width: 80px;
            text-align: center;
        }

        /* Cortina interactiva - Versión discreta */
        .reveal-screen {
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .reveal-header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .reveal-header h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .reveal-header p {
            font-size: 1em;
            opacity: 0.9;
        }

        .reveal-card-container {
            width: 100%;
            max-width: 350px;
            perspective: 1000px;
        }

        .reveal-card {
            background: white;
            border-radius: 24px;
            padding: 0;
            height: 400px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            touch-action: none;
            user-select: none;
        }

        .secret-content-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            z-index: 1;
        }

        .secret-label {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .word-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            border-radius: 16px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ebf0 100%);
            width: 100%;
            word-wrap: break-word;
        }

        .word-display.impostor {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            font-size: 2em;
        }

        .theme-tag {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 15px;
        }

        .transition-shield {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 10;
            border-radius: 24px;
        }

        .cover-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            z-index: 2;
            cursor: grab;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: none;
            will-change: transform;
        }

        .cover-overlay:active {
            cursor: grabbing;
        }

        .cover-overlay.released {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cover-content {
            text-align: center;
            color: white;
            pointer-events: none;
        }

        .cover-player-name {
            font-size: 1.8em;
            font-weight: 800;
            color: white;
            margin-bottom: 4px;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
            word-break: break-word;
        }

        .cover-turn-label {
            font-size: 0.85em;
            color: rgba(255,255,255,0.75);
            font-weight: 500;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .swipe-icon {
            font-size: 3em;
            margin-bottom: 20px;
            animation: swipeUp 2s ease-in-out infinite;
        }

        @keyframes swipeUp {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .swipe-text {
            font-size: 1.2em;
            font-weight: 600;
        }

        .swipe-instruction {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 10px;
        }

        .reveal-progress {
            width: 60px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        .reveal-progress-fill {
            height: 100%;
            background: white;
            transition: width 0.1s linear;
        }

        .next-button-container {
            margin-top: 30px;
            width: 100%;
            max-width: 350px;
        }

        .reveal-toggle-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .reveal-toggle-btn:active {
            transform: scale(0.98);
        }

        .reveal-toggle-btn.showing {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        /* Turnos */
        .turn-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-right: 10px;
        }

        /* Votación */
        .vote-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .vote-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .vote-count-badge {
            background: #667eea;
            color: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 20px;
            height: 30px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: width 0.5s ease;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 30px 20px;
            margin: 20px;
            max-width: 400px;
            width: calc(100% - 40px);
            text-align: center;
            animation: scaleIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .modal-content h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .modal-content p {
            color: #666;
            font-size: 1.1em;
            margin: 10px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            width: 100%;
        }

        .modal-buttons button {
            flex: 1;
            min-width: 0;
        }

        .modal-buttons .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .modal-buttons .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .eliminated-badge {
            opacity: 0.5;
            position: relative;
        }

        .eliminated-badge::after {
            content: '❌';
            position: absolute;
            right: 15px;
            font-size: 1.5em;
        }

        .winner-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .winner-emoji {
            font-size: 6em;
            animation: pulse 1s infinite;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .winner-title {
            font-size: 2.5em;
            font-weight: bold;
            margin: 20px 0;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .final-word {
            font-size: 1.5em;
            color: white;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .player-role-item {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .player-role-item.impostor {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .player-role-item.innocent {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: white;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-btn:active,
        .back-btn:active {
            background: rgba(255, 255, 255, 0.5);
        }

        .eliminations-selector {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .eliminations-selector h3 {
            color: white;
            font-size: 1em;
            margin-bottom: 15px;
            text-align: center;
        }

        .footer {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 0.85em;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 40px;
            width: 100%;
        }

        .footer-content {
            max-width: 440px;
            margin: 0 auto;
        }

        .footer-title {
            font-weight: 700;
            font-size: 1.1em;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .footer-email {
            font-size: 0.85em;
            opacity: 0.85;
            margin-top: 8px;
            color: #e0e0e0;
        }

        .footer-email a {
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .footer-email a:hover {
            opacity: 0.7;
            text-decoration: underline;
        }

        .footer-subtitle {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 5px;
        }

        .footer-year {
            margin-top: 8px;
            font-size: 0.85em;
            opacity: 0.7;
        }

        .custom-category-btn {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(67, 233, 123, 0.4);
        }

        .custom-category-btn:active {
            transform: scale(0.98);
        }

        .custom-category-item {
            background: rgba(67, 233, 123, 0.2);
            border: 2px solid #43e97b;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .custom-category-info {
            flex: 1;
        }

        .custom-category-name {
            font-weight: 700;
            font-size: 1.1em;
            color: #333;
        }

        .custom-category-count {
            font-size: 0.85em;
            color: #666;
            margin-top: 3px;
        }

        .delete-category-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .modal-input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .modal-input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        .modal-input-group input,
        .modal-input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }

        .modal-input-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-input-group input:focus,
        .modal-input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .emoji-selector {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .emoji-option {
            width: 45px;
            height: 45px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            transition: all 0.3s;
            background: white;
        }

        .emoji-option.selected {
            border-color: #667eea;
            background: #667eea;
            transform: scale(1.1);
        }

        .emoji-option:hover {

            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            return Array.from({length: 5}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        }

            let id = localStorage.getItem('impostor_pid');
            if (!id) {
                id = 'p' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
                localStorage.setItem('impostor_pid', id);
            }
            return id;

        async function fbCreateRoom(adminId, adminName, suggestedCode) {
            let code = suggestedCode || generateRoomCode(), attempts = 0;
            while (true) {
                const snap = await db.ref('rooms/' + code).once('value');
                if (!snap.exists()) break;
                if (++attempts >= 10) throw new Error('No se pudo generar código único');
                code = generateRoomCode();
            }
            await db.ref('rooms/' + code).set({
                code, adminId, status: 'lobby', createdAt: TS,
                config: { numImpostors: 1, numEliminationsPerRound: 1, theme: '' },
                secretWord: '', selectedTheme: '', winner: null,
                currentRound: 1, votes: {}, turnOrder: [],
                players: {
                    [adminId]: { name: adminName, isAdmin: true, isImpostor: false, eliminated: false, hasRevealed: false }
                }
            });
            if (window.trackEvent) window.trackEvent('sala_online_creada', { codigo: code });
            return code;
        }

        async function fbJoinRoom(code, playerId, playerName) {
            const snap = await db.ref('rooms/' + code).once('value');
            if (!snap.exists()) throw new Error('Sala no encontrada');
            const room = snap.val();
            if (room.status !== 'lobby') throw new Error('El juego ya comenzó');
            if (Object.keys(room.players || {}).length >= 12) throw new Error('Sala llena (máx. 12 jugadores)');
            await db.ref(`rooms/${code}/players/${playerId}`).set({
                name: playerName, isAdmin: false, isImpostor: false, eliminated: false, hasRevealed: false
            });
            if (window.trackEvent) window.trackEvent('sala_online_unida', { codigo: code });
        }

        async function fbStartGame(code, room, customCats) {
            const allThemes = { ...THEMES, ...(customCats || {}) };
            let theme = room.config?.theme;
            if (!theme) throw new Error('Selecciona una categoría primero');
            if (theme === '🎲 Al Azar') {
                const available = Object.keys(allThemes).filter(t => t !== '🎲 Al Azar');
                theme = available[Math.floor(Math.random() * available.length)];
            }
            const words = allThemes[theme] || [];
            const word = words[Math.floor(Math.random() * words.length)];
            const playerIds = Object.keys(room.players || {});
            const shuffledIds = shuffle(playerIds);
            const numImpostors = room.config?.numImpostors || 1;
            const updates = {};
            shuffledIds.forEach((id, i) => {
                updates[`rooms/${code}/players/${id}/isImpostor`] = i < numImpostors;
                updates[`rooms/${code}/players/${id}/eliminated`] = false;
                updates[`rooms/${code}/players/${id}/hasRevealed`] = false;
            });
            Object.assign(updates, {
                [`rooms/${code}/secretWord`]: word,
                [`rooms/${code}/selectedTheme`]: theme,
                [`rooms/${code}/status`]: 'revealing',
                [`rooms/${code}/currentRound`]: 1,
                [`rooms/${code}/votes`]: {},
                [`rooms/${code}/winner`]: null,
                [`rooms/${code}/turnOrder`]: shuffle([...playerIds])
            });
            await db.ref().update(updates);
            if (window.trackEvent) window.trackEvent('partida_iniciada', {
                modo: 'online',
                jugadores: playerIds.length,
                impostores: numImpostors,
                categoria: theme
            });
        }

        async function fbCastVote(code, voterId, targetId) {
            if (targetId) await db.ref(`rooms/${code}/votes/${voterId}`).set(targetId);
            else await db.ref(`rooms/${code}/votes/${voterId}`).remove();
        }

        async function fbConfirmElimination(code, room, eliminatedIds) {
            const updates = {};
            eliminatedIds.forEach(id => { updates[`rooms/${code}/players/${id}/eliminated`] = true; });
            const allPlayers = Object.entries(room.players || {}).map(([id, p]) => ({
                ...p, id, eliminated: eliminatedIds.includes(id) ? true : p.eliminated
            }));
            const active = allPlayers.filter(p => !p.eliminated);
            const activeImpostors = active.filter(p => p.isImpostor).length;
            const activeInnocents = active.filter(p => !p.isImpostor).length;
            if (activeImpostors === 0) {
                updates[`rooms/${code}/winner`] = 'innocents';
                updates[`rooms/${code}/status`] = 'ended';
                if (window.trackEvent) window.trackEvent('partida_finalizada', {
                    modo: 'online', ganador: 'inocentes', ronda: room.currentRound || 1
                });
            } else if (activeImpostors >= activeInnocents) {
                updates[`rooms/${code}/winner`] = 'impostors';
                updates[`rooms/${code}/status`] = 'ended';
                if (window.trackEvent) window.trackEvent('partida_finalizada', {
                    modo: 'online', ganador: 'impostores', ronda: room.currentRound || 1
                });
            } else {
                updates[`rooms/${code}/status`] = 'playing';
                updates[`rooms/${code}/currentRound`] = (room.currentRound || 1) + 1;
                updates[`rooms/${code}/turnOrder`] = shuffle(active.map(p => p.id));
                updates[`rooms/${code}/votes`] = {};

        const AVATAR_PALETTE = ['#667eea','#f093fb','#fa709a','#43e97b','#4facfe','#f7971e','#a18cd1','#f5576c','#00c6fb','#38f9d7'];
        function avatarColor(name) {
            let h = 0;
            for (let i = 0; i < name.length; i++) h = (name.charCodeAt(i) + ((h << 5) - h)) | 0;
            return AVATAR_PALETTE[Math.abs(h) % AVATAR_PALETTE.length];
        }

        const CONFETTI_COLORS = ['#667eea','#f093fb','#fa709a','#fee140','#43e97b','#4facfe','#f5576c','#ffffff','#ffd89b'];
        const confettiPieces = Array.from({length: 24}, (_, i) => ({
            left: `${(i * 4.2 + 1.5) % 100}%`,
            color: CONFETTI_COLORS[i % CONFETTI_COLORS.length],
            width: `${7 + (i % 4) * 2}px`,
            height: `${9 + (i % 3) * 3}px`,
            delay: `-${((i * 0.22) % 3).toFixed(2)}s`,
            duration: `${(2.8 + (i % 5) * 0.35).toFixed(2)}s`,
            borderRadius: i % 4 === 0 ? '50%' : '2px',
        }));

        function StepIndicator({ step }) {
            const steps = ['👥', '🎯', '😈'];
            return (
                <div className="step-indicator">
                    {steps.map((icon, i) => {
                        const n = i + 1;
                        const state = n < step ? 'completed' : n === step ? 'active' : 'pending';
                        return (
                            <div key={i} className="step-item">
                                {i > 0 && <div className={`step-connector${n <= step ? ' done' : ''}`} />}
                                <div className={`step-dot ${state}`}>{n < step ? '✓' : icon}</div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function ImpostorGame() {
            // Estados principales
            const [screen, setScreen] = useState('participants'); // participants, theme, impostors, revealing, playing, voting, ended
            const [participants, setParticipants] = useState([]);
            const [participantName, setParticipantName] = useState('');
            const [selectedTheme, setSelectedTheme] = useState('');
            const [numImpostors, setNumImpostors] = useState(1);
            const [numEliminationsPerRound, setNumEliminationsPerRound] = useState(1);
            const [secretWord, setSecretWord] = useState('');
            const [currentRevealIndex, setCurrentRevealIndex] = useState(0);
            const [curtainPosition, setCurtainPosition] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const [isRevealed, setIsRevealed] = useState(false);
            const [turnOrder, setTurnOrder] = useState([]);
            const [currentRound, setCurrentRound] = useState(1);
            const [votes, setVotes] = useState({});
            const [showConfirmation, setShowConfirmation] = useState(false);
            const [selectedToEliminate, setSelectedToEliminate] = useState([]);
            const [winner, setWinner] = useState(null);
            const [showInnocentModal, setShowInnocentModal] = useState(false);
            const [customCategories, setCustomCategories] = useState({});
            const [showCustomCategoryModal, setShowCustomCategoryModal] = useState(false);
            const [newCategoryName, setNewCategoryName] = useState('');
            const [newCategoryWords, setNewCategoryWords] = useState('');
            const [newCategoryEmoji, setNewCategoryEmoji] = useState('🎯');
            const [currentWord, setCurrentWord] = useState('');
            const [wordsList, setWordsList] = useState([]);
            const [lastUsedWords, setLastUsedWords] = useState({});
            const [showMenu, setShowMenu] = useState(false);
            const [isNextLoading, setIsNextLoading] = useState(false);

            const dragStartYRef = useRef(0);
            const dragStartPositionRef = useRef(0);
            const isNavigatingRef = useRef(false);
            const innocentModalTimerRef = useRef(null);

            // Funciones de participantes
            const handleResetGame = () => {
                if (confirm('¿Estás seguro que quieres reiniciar el juego? Se perderá todo el progreso.')) {
                    if (innocentModalTimerRef.current) {
                        clearTimeout(innocentModalTimerRef.current);
                        innocentModalTimerRef.current = null;
                    }
                    setScreen('participants');
                    setParticipants([]);
                    setParticipantName('');
                    setSelectedTheme('');
                    setNumImpostors(1);
                    setNumEliminationsPerRound(1);
                    setSecretWord('');
                    setCurrentRevealIndex(0);
                    setCurtainPosition(0);
                    setIsDragging(false);
                    setIsRevealed(false);
                    setTurnOrder([]);
                    setCurrentRound(1);
                    setVotes({});
                    setShowConfirmation(false);
                    setSelectedToEliminate([]);
                    setWinner(null);
                    setShowInnocentModal(false);
                }
            };

            const addParticipant = () => {
                if (participantName.trim() && !participants.find(p => p.name === participantName.trim())) {
                    setParticipants([...participants, { 
                        name: participantName.trim(), 
                        isImpostor: false, 
                        eliminated: false
                    }]);
                    setParticipantName('');
                }
            };

            const removeParticipant = (name) => {
                setParticipants(participants.filter(p => p.name !== name));
            };

            const goToThemeSelection = () => {
                if (participants.length < 3) {
                    alert('Se necesitan al menos 3 participantes');
                    return;
                }
                setScreen('theme');
            };

            const handleAddWord = () => {
                const trimmedWord = currentWord.trim();
                
                if (!trimmedWord) {
                    alert('Escribe una palabra antes de agregar');
                    return;
                }
                
                if (wordsList.includes(trimmedWord)) {
                    alert('Esta palabra ya fue agregada');
                    return;
                }
                
                setWordsList([...wordsList, trimmedWord]);
                setCurrentWord('');
            };

            const handleRemoveLastWord = () => {
                if (wordsList.length > 0) {
                    setWordsList(wordsList.slice(0, -1));
                }
            };

            const handleAddCustomCategory = () => {
                if (!newCategoryName.trim()) {
                    alert('Ingresa un nombre para la categoría');
                    return;
                }
                
                if (wordsList.length < 5) {
                    alert('Agrega al menos 5 palabras');
                    return;
                }

                const categoryKey = `${newCategoryEmoji} ${newCategoryName}`;
                
                setCustomCategories({
                    ...customCategories,
                    [categoryKey]: wordsList
                });

                // Limpiar formulario
                setNewCategoryName('');
                setNewCategoryWords('');
                setNewCategoryEmoji('🎯');
                setCurrentWord('');
                setWordsList([]);
                setShowCustomCategoryModal(false);
                
                alert(`✅ Categoría "${categoryKey}" agregada con ${wordsList.length} palabras`);
            };

            const handleDeleteCustomCategory = (categoryKey) => {
                if (confirm(`¿Eliminar la categoría "${categoryKey}"?`)) {
                    const newCategories = { ...customCategories };
                    delete newCategories[categoryKey];
                    setCustomCategories(newCategories);
                    
                    // Si era la categoría seleccionada, deseleccionar
                    if (selectedTheme === categoryKey) {
                        setSelectedTheme('');
                    }
                }
            };

            const getAllThemes = () => {
                return { ...THEMES, ...customCategories };
            };

            const handleMenuNavigation = (targetScreen) => {
                // Si está en medio del juego, pedir confirmación
                if (screen === 'revealing' || screen === 'playing' || screen === 'voting') {
                    if (!confirm('¿Estás seguro? Se perderá el progreso actual del juego.')) {
                        setShowMenu(false);
                        return;
                    }
                }

                // Navegar a la pantalla deseada
                switch(targetScreen) {
                    case 'participants':
                        setScreen('participants');
                        // Mantener participantes pero limpiar el resto
                        setSelectedTheme('');
                        setNumImpostors(1);
                        setNumEliminationsPerRound(1);
                        break;
                    case 'theme':
                        if (participants.length < 3) {
                            alert('Primero agrega al menos 3 participantes');
                            setScreen('participants');
                        } else {
                            setScreen('theme');
                        }
                        break;
                    case 'impostors':
                        if (participants.length < 3) {
                            alert('Primero agrega al menos 3 participantes');
                            setScreen('participants');
                        } else if (!selectedTheme) {
                            alert('Primero selecciona una categoría');
                            setScreen('theme');
                        } else {
                            setScreen('impostors');
                        }
                        break;
                    default:
                        setScreen(targetScreen);
                }

                setShowMenu(false);
            };

            const goToImpostorSelection = () => {
                if (!selectedTheme) {
                    alert('Selecciona una temática');
                    return;
                }
                setScreen('impostors');
            };

            const startGame = () => {
                if (numImpostors >= participants.length) {
                    alert('El número de impostores debe ser menor al número de participantes');
                    return;
                }

                const allThemes = getAllThemes();

                // Determinar la temática final
                let finalTheme = selectedTheme;
                
                // Si es "Al Azar", seleccionar una categoría aleatoria
                if (selectedTheme === '🎲 Al Azar') {
                    const availableThemes = Object.keys(allThemes).filter(t => t !== '🎲 Al Azar');
                    finalTheme = availableThemes[Math.floor(Math.random() * availableThemes.length)];
                }

                const allWords = allThemes[finalTheme];
                
                // Obtener las últimas palabras usadas de esta categoría
                const recentWords = lastUsedWords[finalTheme] || [];
                
                // Filtrar palabras que no estén en las últimas 3 usadas
                let availableWords = allWords.filter(word => !recentWords.includes(word));
                
                // Si no hay palabras disponibles (muy raro), usar todas
                if (availableWords.length === 0) {
                    availableWords = allWords;
                }
                
                // Seleccionar palabra aleatoria
                const word = availableWords[Math.floor(Math.random() * availableWords.length)];
                setSecretWord(word);
                
                // Actualizar historial de palabras usadas (mantener últimas 3)
                const updatedHistory = [word, ...recentWords].slice(0, 3);
                setLastUsedWords({
                    ...lastUsedWords,
                    [finalTheme]: updatedHistory
                });

                // Crear una copia de los participantes
                const participantsCopy = [...participants];
                
                const shuffled = shuffle(participantsCopy);

                const withRoles = shuffled.map((p, i) => ({
                    ...p,
                    isImpostor: i < numImpostors
                }));

                const finalOrder = shuffle(withRoles);
                
                // Actualizar la temática seleccionada para mostrar la real si era al azar
                setSelectedTheme(finalTheme);
                
                setParticipants(finalOrder);
                setScreen('revealing');
                setCurrentRevealIndex(0);
                setCurtainPosition(0);
                setIsRevealed(false);

                if (window.trackEvent) window.trackEvent('partida_iniciada', {
                    modo: 'local',
                    jugadores: finalOrder.length,
                    impostores: numImpostors,
                    categoria: finalTheme
                });
            };

            // Manejo de la cortina interna - Siempre vuelve a bajar
            const handleCoverStart = (clientY) => {
                if (isRevealed) return;
                dragStartYRef.current = clientY;
                dragStartPositionRef.current = curtainPosition;
                setIsDragging(true);
            };

            const handleCoverMove = (clientY) => {
                if (!isDragging || isRevealed) return;

                const card = document.querySelector('.reveal-card');
                if (!card) return;

                const cardRect = card.getBoundingClientRect();
                const deltaY = dragStartYRef.current - clientY;
                const deltaPercent = (deltaY / cardRect.height) * 100;

                let newPosition = dragStartPositionRef.current + deltaPercent;
                newPosition = Math.max(0, Math.min(100, newPosition));
                setCurtainPosition(newPosition);
            };

            const handleCoverEnd = () => {
                if (isRevealed) return;
                setIsDragging(false);
                setCurtainPosition(0);
            };

            const handleToggleReveal = () => {
                if (!isRevealed) {
                    // Mostrar: animar hacia arriba
                    setIsRevealed(true);
                    setCurtainPosition(100);
                } else {
                    // Ocultar: animar hacia abajo
                    setIsRevealed(false);
                    setCurtainPosition(0);
                }
            };

            const nextParticipant = () => {
                if (isNavigatingRef.current) return;
                if (isRevealed) {
                    alert('⚠️ Debes ocultar la palabra antes de continuar');
                    return;
                }

                isNavigatingRef.current = true;
                setIsNextLoading(true);

                setTimeout(() => {
                    isNavigatingRef.current = false;
                    setIsNextLoading(false);
                    if (currentRevealIndex < participants.length - 1) {
                        setCurrentRevealIndex(currentRevealIndex + 1);
                        setCurtainPosition(0);
                        setIsRevealed(false);
                    } else {
                        startPlayingPhase();
                    }
                }, 350);
            };

            const startPlayingPhase = () => {
                const activePlayers = participants.filter(p => !p.eliminated);
                setTurnOrder(shuffle(activePlayers).map(p => p.name));
                setScreen('playing');
            };

            const handleStartVoting = () => {
                const initialVotes = {};
                participants.filter(p => !p.eliminated).forEach(p => {
                    initialVotes[p.name] = 0;
                });
                setVotes(initialVotes);
                setScreen('voting');
            };

            const handleAddVote = (playerName) => {
                const activePlayers = participants.filter(p => !p.eliminated);
                const totalVotes = Object.values(votes).reduce((sum, count) => sum + count, 0);
                
                if (totalVotes < activePlayers.length) {
                    setVotes({
                        ...votes,
                        [playerName]: (votes[playerName] || 0) + 1
                    });
                }
            };

            const handleRemoveVote = (playerName) => {
                if (votes[playerName] > 0) {
                    setVotes({
                        ...votes,
                        [playerName]: votes[playerName] - 1
                    });
                }
            };

            const handleConfirmElimination = () => {
                const activePlayers = participants.filter(p => !p.eliminated);
                const totalVotes = Object.values(votes).reduce((sum, count) => sum + count, 0);
                
                if (totalVotes < activePlayers.length) {
                    alert(`Faltan ${activePlayers.length - totalVotes} voto(s)`);
                    return;
                }
                
                // Obtener jugadores ordenados por votos (de mayor a menor)
                const sortedPlayers = Object.keys(votes)
                    .map(name => ({ name, votes: votes[name] }))
                    .sort((a, b) => b.votes - a.votes);

                // Obtener los N jugadores con más votos según numEliminationsPerRound
                const playersToEliminate = [];
                
                for (let i = 0; i < numEliminationsPerRound && i < sortedPlayers.length; i++) {
                    if (sortedPlayers[i].votes > 0) {
                        playersToEliminate.push(sortedPlayers[i].name);
                    }
                }

                // Verificar si hay empate en la última posición de eliminación
                if (playersToEliminate.length === numEliminationsPerRound) {
                    const lastVoteCount = sortedPlayers[numEliminationsPerRound - 1].votes;
                    
                    // Contar cuántos jugadores tienen la misma cantidad de votos que el último
                    const playersWithSameVotes = sortedPlayers.filter(p => p.votes === lastVoteCount);
                    
                    if (playersWithSameVotes.length > 1) {
                        // Verificar si hay más jugadores empatados de los que se pueden eliminar
                        const tiedPlayers = playersWithSameVotes.map(p => p.name);
                        const tiedInSelection = playersToEliminate.filter(p => tiedPlayers.includes(p));
                        
                        if (tiedPlayers.length > tiedInSelection.length) {
                            alert(`⚠️ Hay un empate entre ${playersWithSameVotes.length} jugadores con ${lastVoteCount} voto(s) cada uno: ${tiedPlayers.join(', ')}. No se puede determinar a quién eliminar. Vuelvan a votar.`);
                            return;
                        }
                    }
                }

                if (playersToEliminate.length > 0) {
                    setSelectedToEliminate(playersToEliminate);
                    setShowConfirmation(true);
                } else {
                    alert('Debe haber al menos un voto para continuar');
                }
            };

            const handleFinalConfirmation = () => {
                const updatedParticipants = participants.map(p => {
                    if (selectedToEliminate.includes(p.name)) {
                        return { ...p, eliminated: true };
                    }
                    return p;
                });
                setParticipants(updatedParticipants);

                setShowConfirmation(false);

                // Verificar si algún eliminado es inocente
                const eliminatedPlayers = participants.filter(p => selectedToEliminate.includes(p.name));
                const hasInnocent = eliminatedPlayers.some(p => !p.isImpostor);

                if (hasInnocent) {
                    setShowInnocentModal(true);
                    innocentModalTimerRef.current = setTimeout(() => {
                        innocentModalTimerRef.current = null;
                        setShowInnocentModal(false);
                        checkWinConditions(updatedParticipants);
                    }, 3000);
                } else {
                    checkWinConditions(updatedParticipants);
                }
            };

            const checkWinConditions = (currentParticipants) => {
                const activePlayers = currentParticipants.filter(p => !p.eliminated);
                const activeImpostors = activePlayers.filter(p => p.isImpostor).length;
                const activeInnocents = activePlayers.filter(p => !p.isImpostor).length;

                setSelectedToEliminate([]);
                setVotes({});

                if (activeImpostors === 0) {
                    setWinner('innocents');
                    setScreen('ended');
                    if (window.trackEvent) window.trackEvent('partida_finalizada', {
                        modo: 'local', ganador: 'inocentes', ronda: currentRound
                    });
                } else if (activeImpostors >= activeInnocents) {
                    setWinner('impostors');
                    setScreen('ended');
                    if (window.trackEvent) window.trackEvent('partida_finalizada', {
                        modo: 'local', ganador: 'impostores', ronda: currentRound
                    });
                } else {
                    setCurrentRound(currentRound + 1);
                    startPlayingPhase();
                }
            };

            const handleNewRound = () => {
                const resetParticipants = participants.map(p => ({
                    ...p,
                    isImpostor: false,
                    eliminated: false
                }));
                setParticipants(resetParticipants);
                setCurrentRound(1);
                setWinner(null);
                setScreen('impostors');
            };

            const handleAddMoreParticipants = () => {
                const resetParticipants = participants.map(p => ({
                    ...p,
                    isImpostor: false,
                    eliminated: false
                }));
                setParticipants(resetParticipants);
                setCurrentRound(1);
                setWinner(null);
                setScreen('participants');
            };

            const handleChangeTheme = () => {
                const resetParticipants = participants.map(p => ({
                    ...p,
                    isImpostor: false,
                    eliminated: false
                }));
                setParticipants(resetParticipants);
                setCurrentRound(1);
                setWinner(null);
                setSelectedTheme('');
                setScreen('theme');
            };

            // Pantalla de revelación con tarjeta interna
            if (screen === 'revealing') {
                const currentParticipant = participants[currentRevealIndex];

                return (
                    <div className="app-container">
                        <div className="reveal-screen">
                            <div className="reveal-header">
                                <div className="avatar avatar-lg" style={{background: avatarColor(currentParticipant.name)}}>
                                    {currentParticipant.name.charAt(0)}
                                </div>
                                <h2>{currentParticipant.name}</h2>
                                <p>Jugador {currentRevealIndex + 1} de {participants.length}</p>
                            </div>

                            <div className="reveal-card-container">
                                <div className="reveal-card">
                                    {isNextLoading && <div className="transition-shield" />}
                                    {/* Contenido secreto debajo */}
                                    <div className="secret-content-card">
                                        {currentParticipant.isImpostor ? (
                                            <>
                                                <div className="secret-label">Tu rol es</div>
                                                <div className="word-display impostor">
                                                    😈 IMPOSTOR
                                                </div>
                                                <p style={{fontSize: '0.95em', textAlign: 'center', color: '#666', padding: '0 20px'}}>
                                                    Descubre la palabra secreta sin ser descubierto
                                                </p>
                                            </>
                                        ) : (

                                                    {secretWord}
                                                </div>
                                                <div className="theme-tag">

                                        onMouseMove={(e) => isDragging && handleCoverMove(e.clientY)}
                                        onMouseUp={handleCoverEnd}
                                        onMouseLeave={handleCoverEnd}
                                        onTouchStart={(e) => {
                                            handleCoverStart(e.touches[0].clientY);

                                        onTouchMove={(e) => {
                                            handleCoverMove(e.touches[0].clientY);
