                                                <span key={name}>
                                                    <strong style={{fontSize: '1.2em', color: '#667eea'}}>{name}</strong>
                                                    {index < selectedToEliminate.length - 1 && <br/>}
                                                </span>
                                            ))}
                                        </p>
                                        <p style={{fontSize: '0.95em', marginTop: '10px'}}>
                                            {selectedToEliminate.map(name => `${name}: ${votes[name]} voto(s)`).join(', ')}
                                        </p>
                                        <div className="modal-buttons">
                                            <button 
                                                className="btn btn-outline"
                                                onClick={() => setShowConfirmation(false)}
                                            >
                                                Cancelar
                                            </button>
                                            <button 
                                                className="btn btn-secondary"
                                                onClick={handleFinalConfirmation}
                                            >
                                                Confirmar
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {showInnocentModal && (
                                <div className="modal-overlay">
                                    <div className="modal-content">
                                        <div className="modal-emoji">😢</div>
                                        <h2>¡Eliminaron a un Inocente!</h2>
                                        <p style={{fontSize: '1.2em', color: '#666'}}>
                                            {selectedToEliminate} no era el impostor
                                        </p>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Pantalla Final */}
                    {screen === 'ended' && (
                        <div className="screen">
                            <div className="confetti-container">
                                {confettiPieces.map((p, i) => (
                                    <div key={i} className="confetti-piece" style={{
                                        left: p.left,
                                        background: p.color,
                                        width: p.width,
                                        height: p.height,
                                        borderRadius: p.borderRadius,
                                        animationDelay: p.delay,
                                        animationDuration: p.duration
                                    }} />
                                ))}
                            </div>
                            <div className="winner-screen">
                                <div className="winner-emoji">
                                    {winner === 'innocents' ? '🎉' : '😈'}
                                </div>
                                <div className="winner-title">
                                    {winner === 'innocents' 
                                        ? '¡Ganan los Inocentes!' 
                                        : '¡Ganan los Impostores!'}
                                </div>
                                <div className="final-word">
                                    La palabra era: <strong>{secretWord}</strong>
                                </div>

                                <div className="card">
                                    <h2>Revelación Final</h2>
                                    {participants.map(p => (
                                        <div
                                            key={p.name}
                                            className={`player-role-item ${p.isImpostor ? 'impostor' : 'innocent'}`}
                                        >
                                            <div style={{display:'flex', alignItems:'center', gap:10}}>
                                                <div className="avatar" style={{background: 'rgba(255,255,255,0.3)', fontSize:'0.85em'}}>{p.name.charAt(0)}</div>
                                                <span>{p.name}</span>
                                            </div>
                                            <span>{p.isImpostor ? '😈 IMPOSTOR' : '😇 INOCENTE'}</span>
                                        </div>
                                    ))}
                                </div>

                                <button className="btn btn-primary" onClick={handleNewRound}>
                                    🔄 Nueva Ronda
                                </button>
                                <button className="btn btn-secondary" onClick={handleChangeTheme}>
                                    🎯 Cambiar Temática
                                </button>
                                <button className="btn btn-outline" onClick={handleAddMoreParticipants}>
                                    ➕ Agregar Participantes
                                </button>

                                <div className="footer">
                                    <div className="footer-content">
                                        <div className="footer-title">App desarrollada por Ing. José Armando Navarrete</div>
                                        <div className="footer-email">
                                            <a href="mailto:jnavarretejimenez98@gmail.com">jnavarretejimenez98@gmail.com</a>
                                        </div>
                                        <div className="footer-year">© 2025 - Todos los derechos reservados</div>
                                    <div className="footer-year" style={{marginTop: '6px'}}>
                                        <a href="/privacidad.html" style={{color: '#fff', opacity: 0.8, textDecoration: 'underline'}}>Política de Privacidad</a>
                                    </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* ══════════════════════════════════════
           ONLINE GAME COMPONENT
        ══════════════════════════════════════ */
        function OnlineGame({ onExit }) {
            const [playerName, setPlayerName] = useState('');
            const [inputCode, setInputCode] = useState('');
            const [roomCode, setRoomCode] = useState('');
            const [proposedCode] = useState(() => generateRoomCode());
            const [room, setRoom] = useState(null);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [myVote, setMyVote] = useState(null);
            const [onlineCurtainPos, setOnlineCurtainPos] = useState(0);
            const [onlineDragging, setOnlineDragging] = useState(false);
            const [onlineRevealed, setOnlineRevealed] = useState(false);
            const [hasEverRevealed, setHasEverRevealed] = useState(false);
            const myPlayerId = useRef(getOrCreatePlayerId()).current;
            const onlineDragStartY = useRef(0);
            const onlineDragStartPos = useRef(0);

            const isAdmin = room?.adminId === myPlayerId;
            const me = room?.players?.[myPlayerId];

            /* Subscribe to room on Firebase */
            useEffect(() => {
                if (!roomCode) return;
                const ref = db.ref('rooms/' + roomCode);
                ref.on('value', snap => setRoom(snap.val()));
                return () => ref.off('value');
            }, [roomCode]);

            /* Keep myVote in sync */
            useEffect(() => {
                if (room?.votes) setMyVote(room.votes[myPlayerId] || null);
            }, [room?.votes]);

            const getVoteCounts = () => {
                const counts = {};
                Object.values(room?.votes || {}).forEach(tid => {
                    if (tid) counts[tid] = (counts[tid] || 0) + 1;
                });
                return counts;
            };

            /* ── Handlers ── */
            const handleCreate = async () => {
                if (!playerName.trim()) { setError('Ingresa tu nombre'); return; }
                setLoading(true); setError('');
                try {
                    const code = await fbCreateRoom(myPlayerId, playerName.trim(), proposedCode);
                    setRoomCode(code);
                } catch(e) { setError(e.message); }
                setLoading(false);
            };

            const handleJoin = async () => {
                if (!playerName.trim()) { setError('Ingresa tu nombre'); return; }
                if (!inputCode.trim()) { setError('Ingresa el código de sala'); return; }
                setLoading(true); setError('');
                try {
                    const code = inputCode.trim().toUpperCase();
                    await fbJoinRoom(code, myPlayerId, playerName.trim());
                    setRoomCode(code);
                } catch(e) { setError(e.message); }
                setLoading(false);
            };

            const handleStartGame = async () => {
                const playerCount = Object.keys(room?.players || {}).length;
                if (playerCount < 3) { setError('Mínimo 3 jugadores'); return; }
                if (!room?.config?.theme) { setError('Selecciona una categoría'); return; }
                setLoading(true); setError('');
                try { await fbStartGame(roomCode, room, {}); }
                catch(e) { setError(e.message); }
                setLoading(false);
            };

            const handleVote = async (targetId) => {
                const newVote = myVote === targetId ? null : targetId;
                setMyVote(newVote);
                await fbCastVote(roomCode, myPlayerId, newVote);
            };

            const handleStartVoting = async () => {
                await db.ref().update({
                    [`rooms/${roomCode}/status`]: 'voting',
                    [`rooms/${roomCode}/votes`]: {}
                });
                setMyVote(null);
            };

            const handleStartPlaying = async () => {
                const active = Object.keys(room?.players || {}).filter(id => !room.players[id].eliminated);
                await db.ref().update({
                    [`rooms/${roomCode}/status`]: 'playing',
                    [`rooms/${roomCode}/turnOrder`]: shuffle(active)
                });
            };

            const handleLeave = () => {
                if (roomCode) db.ref(`rooms/${roomCode}/players/${myPlayerId}`).remove();
                setRoomCode(''); setRoom(null); setMyVote(null); setError('');
            };

            const handleOnlineCoverStart = (clientY) => {
                if (onlineRevealed) return;
                onlineDragStartY.current = clientY;
                onlineDragStartPos.current = onlineCurtainPos;
                setOnlineDragging(true);
            };
            const handleOnlineCoverMove = (clientY) => {
                if (!onlineDragging || onlineRevealed) return;
                const card = document.querySelector('.online-curtain-card');
                if (!card) return;
                const deltaY = onlineDragStartY.current - clientY;
                const newPos = Math.max(0, Math.min(100, onlineDragStartPos.current + (deltaY / card.getBoundingClientRect().height) * 100));
                setOnlineCurtainPos(newPos);
            };
            const handleOnlineCoverEnd = () => {
                setOnlineDragging(false);
                if (onlineCurtainPos > 50) { setOnlineRevealed(true); setHasEverRevealed(true); }
                else setOnlineCurtainPos(0);
            };
            const handleOnlineToggleReveal = () => {
                if (onlineRevealed) { setOnlineRevealed(false); setOnlineCurtainPos(0); }
                else { setOnlineRevealed(true); setHasEverRevealed(true); }
            };

            /* ── Screens ── */
            const renderLobby = () => {
                const players = Object.entries(room.players || {});
                const numImpostors = room.config?.numImpostors || 1;
                const numElim = room.config?.numEliminationsPerRound || 1;
                const canStart = players.length >= 3 && room.config?.theme;

                return (
                    <div className="screen">
                        <div className="header">
                            <h1>🎭 El Impostor</h1>
                            <p>Sala de espera</p>
                        </div>

                        <div className="card">
                            <h2 style={{textAlign:'center'}}>Código de Sala</h2>
                            <div className="room-code-display">{roomCode}</div>
                            <p style={{textAlign:'center', color:'#666', fontSize:'0.85em'}}>
                                Comparte este código con los demás jugadores
                            </p>
                        </div>

                        <div className="card">
                            <h2>Jugadores ({players.length}/12)</h2>
                            {players.map(([id, p]) => (
                                <div key={id} className="lobby-player-row">
                                    <div className="avatar" style={{background: avatarColor(p.name)}}>{p.name.charAt(0)}</div>
                                    <span style={{fontWeight:600, flex:1}}>{p.name}{id === myPlayerId ? ' (tú)' : ''}</span>
                                    {p.isAdmin && <span style={{fontSize:'0.73em', background:'#667eea', color:'white', padding:'3px 10px', borderRadius:20}}>Admin</span>}
                                </div>
                            ))}
                            {players.length < 3 && (
                                <p style={{color:'#aaa', fontSize:'0.84em', textAlign:'center', marginTop:8}}>
                                    Esperando jugadores... (mínimo 3)
                                </p>
                            )}
                        </div>

                        {isAdmin ? (
                            <div className="card">
                                <h2>Configuración</h2>
                                <div className="input-group" style={{marginBottom:0}}>
                                    <label>Categoría</label>
                                    <div className="theme-grid">
                                        {Object.keys(THEMES).map(theme => (
                                            <div
                                                key={theme}
                                                className={`theme-card ${room.config?.theme === theme ? 'selected' : ''} ${theme === '🎲 Al Azar' ? 'random' : ''}`}
                                                onClick={() => db.ref(`rooms/${roomCode}/config/theme`).set(theme)}
                                            >{theme}</div>
                                        ))}
                                    </div>
                                </div>
                                <div style={{marginTop:15}}>
                                    <label style={{display:'block', marginBottom:8, color:'#666', fontWeight:600, fontSize:'0.9em'}}>Impostores</label>
                                    <div className="impostor-selector">
                                        <button className="impostor-btn" onClick={() => db.ref(`rooms/${roomCode}/config/numImpostors`).set(Math.max(1, numImpostors - 1))}>−</button>
                                        <div className="impostor-number">{numImpostors}</div>
                                        <button className="impostor-btn" onClick={() => db.ref(`rooms/${roomCode}/config/numImpostors`).set(Math.min(players.length - 1, numImpostors + 1))}>+</button>
                                    </div>
                                </div>
                                <div style={{marginTop:15}}>
                                    <label style={{display:'block', marginBottom:8, color:'#666', fontWeight:600, fontSize:'0.9em'}}>Eliminaciones por ronda</label>
                                    <div className="impostor-selector">
                                        <button className="impostor-btn" onClick={() => db.ref(`rooms/${roomCode}/config/numEliminationsPerRound`).set(Math.max(1, numElim - 1))}>−</button>
                                        <div className="impostor-number">{numElim}</div>
                                        <button className="impostor-btn" onClick={() => db.ref(`rooms/${roomCode}/config/numEliminationsPerRound`).set(Math.min(Math.max(1, players.length - 2), numElim + 1))}>+</button>
                                    </div>
                                </div>
                                {error && <p style={{color:'#f5576c', textAlign:'center', marginTop:10, fontSize:'0.9em'}}>{error}</p>}
                                <button className="btn btn-secondary" onClick={handleStartGame} disabled={!canStart || loading}>
                                    {loading ? 'Iniciando...' : 'Iniciar Juego 🎮'}
                                </button>
                            </div>
                        ) : (
                            <div className="online-waiting-box">
                                <span className="pulse-dot" />
                                Esperando que el admin inicie el juego...
                                {room.config?.theme && (
                                    <div style={{marginTop:8, fontSize:'0.88em', opacity:0.85}}>
                                        Categoría: <strong>{room.config.theme}</strong>
                                    </div>
                                )}
                            </div>
                        )}

                        <button className="btn btn-outline" style={{marginTop:12}} onClick={handleLeave}>
                            Salir de la sala
                        </button>
                    </div>
                );
            };

            const renderReveal = () => {
                if (!me) return null;
                const allPlayers = Object.values(room.players || {});
                const revealedCount = allPlayers.filter(p => p.hasRevealed).length;
                const allRevealed = revealedCount === allPlayers.length;

                return (
                    <div className="reveal-screen">
                        <div className="reveal-header">
                            <div className="avatar avatar-lg" style={{background: avatarColor(me.name)}}>{me.name.charAt(0)}</div>
                            <h2>{me.name}</h2>
                            <p>Tu rol secreto</p>
                        </div>

                        {!me.hasRevealed ? (
                            <>
                                <div className="reveal-card-container">
                                    <div className="reveal-card online-curtain-card">
                                        {/* Contenido secreto debajo */}
                                        <div className="secret-content-card">
                                            {me.isImpostor ? (
                                                <>
                                                    <div className="secret-label">Tu rol es</div>
                                                    <div className="word-display impostor">😈 IMPOSTOR</div>
                                                    <p style={{fontSize:'0.92em', color:'#666', padding:'0 10px', marginTop:10}}>
                                                        Descubre la palabra sin ser descubierto
                                                    </p>
                                                </>
                                            ) : (
                                                <>
                                                    <div className="secret-label">Tu palabra es</div>
                                                    <div className="word-display">{room.secretWord}</div>
                                                    <div className="theme-tag">{room.selectedTheme}</div>
                                                </>
                                            )}
                                        </div>
                                        {/* Cortina */}
                                        <div
                                            className={`cover-overlay ${!onlineDragging && !onlineRevealed ? 'released' : ''}`}
                                            style={{
                                                transform: `translateY(-${onlineRevealed ? 100 : onlineCurtainPos}%)`,
                                                transition: onlineRevealed
                                                    ? 'transform 0.5s cubic-bezier(0.4,0,0.2,1)'
                                                    : (!onlineDragging ? 'transform 0.4s cubic-bezier(0.4,0,0.2,1)' : 'none')
                                            }}
                                            onMouseDown={e => handleOnlineCoverStart(e.clientY)}
                                            onMouseMove={e => onlineDragging && handleOnlineCoverMove(e.clientY)}
                                            onMouseUp={handleOnlineCoverEnd}
                                            onMouseLeave={handleOnlineCoverEnd}
                                            onTouchStart={e => handleOnlineCoverStart(e.touches[0].clientY)}
                                            onTouchMove={e => handleOnlineCoverMove(e.touches[0].clientY)}
                                            onTouchEnd={e => { e.preventDefault(); handleOnlineCoverEnd(); }}
                                        >
                                            <div className="cover-content">
                                                <div className="cover-player-name">{me.name}</div>
                                                <div className="cover-turn-label">tu rol secreto</div>
                                                <div className="swipe-icon">☝️</div>
                                                <div className="swipe-text">Mantén presionado</div>
                                                <div className="swipe-instruction">y desliza hacia arriba</div>
                                                <div className="reveal-progress">
                                                    <div className="reveal-progress-fill"
                                                        style={{width: `${onlineRevealed ? 100 : onlineCurtainPos}%`}} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="next-button-container">
                                    <button
                                        className={`reveal-toggle-btn ${onlineRevealed ? 'showing' : ''}`}
                                        onClick={handleOnlineToggleReveal}
                                    >
                                        {onlineRevealed ? '🙈 Ocultar' : '👁️ Mostrar'}
                                    </button>
                                    <button className="btn btn-primary"
                                        disabled={!hasEverRevealed}
                                        onClick={() => db.ref(`rooms/${roomCode}/players/${myPlayerId}/hasRevealed`).set(true)}>
                                        Entendido ✓
                                    </button>
                                </div>
                            </>
                        ) : (
                            <div className="online-reveal-card">
                                <div style={{fontSize:'3em', marginBottom:12}}>✅</div>
                                <h3 style={{color:'#333', marginBottom:8}}>¡Listo!</h3>
                                <p style={{color:'#666'}}>
                                    {revealedCount}/{allPlayers.length} jugadores confirmados
                                </p>
                                {!allRevealed && (
                                    <p style={{color:'#aaa', fontSize:'0.85em', marginTop:8}}>
                                        <span className="pulse-dot" />
                                        Esperando a los demás...
                                    </p>
                                )}
                                {allRevealed && isAdmin && (
                                    <button className="btn btn-secondary" style={{marginTop:15}} onClick={handleStartPlaying}>
                                        Comenzar Juego 🎮
                                    </button>
                                )}
                                {allRevealed && !isAdmin && (
                                    <p style={{color:'#667eea', fontWeight:600, marginTop:8}}>
                                        ¡Todos listos! Esperando al admin...
                                    </p>
                                )}
                            </div>
                        )}
                    </div>
                );
            };

            const renderPlaying = () => {
                const players = room.players || {};
                const turnOrder = room.turnOrder || [];
                return (
                    <div className="screen">
                        <div className="header">
                            <h1>Ronda {room.currentRound}</h1>
                            <p>{room.selectedTheme}</p>
                        </div>
                        <div className="card">
                            <h2>Orden de Turnos</h2>
                            <p style={{color:'#666', marginBottom:15, fontSize:'0.88em'}}>
                                Cada jugador dice una pista relacionada con el tema
                            </p>
                            {turnOrder.map((id, index) => {
                                const p = players[id];
                                if (!p) return null;
                                return (
                                    <div key={id} className={`participant-item${index === 0 ? ' turn-current' : ''}`}>
                                        <div className="participant-info">
                                            <div className="avatar" style={{background: avatarColor(p.name)}}>{p.name.charAt(0)}</div>
                                            <span>
                                                <span className="turn-badge">{index + 1}</span>
                                                <span className="participant-name" style={{marginLeft:6}}>
                                                    {p.name}{id === myPlayerId ? ' (tú)' : ''}
                                                </span>
                                            </span>
                                        </div>
                                        {index === 0 && <span className="turn-now-badge">Ahora</span>}
                                    </div>
                                );
                            })}
                        </div>
                        {isAdmin
                            ? <button className="btn btn-primary" onClick={handleStartVoting}>Ir a Votación 🗳️</button>
                            : <div className="online-waiting-box"><span className="pulse-dot" />El admin controlará la votación</div>
                        }
                    </div>
                );
            };

            const renderVoting = () => {
                const players = room.players || {};
                const activePlayers = Object.entries(players).filter(([_, p]) => !p.eliminated);
                const voteCounts = getVoteCounts();
                const totalVotes = Object.values(room.votes || {}).filter(Boolean).length;
                const progress = activePlayers.length > 0 ? (totalVotes / activePlayers.length) * 100 : 0;
                const allVoted = totalVotes >= activePlayers.length;
                const numElim = room.config?.numEliminationsPerRound || 1;
                const sorted = activePlayers
                    .map(([id, p]) => ({id, name: p.name, votes: voteCounts[id] || 0}))
                    .sort((a, b) => b.votes - a.votes);
                const toEliminate = sorted.slice(0, numElim).filter(p => p.votes > 0).map(p => p.id);

                return (
                    <div className="screen">
                        <div className="header">
                            <h1>🗳️ Votación</h1>
                            <p>Ronda {room.currentRound}</p>
                        </div>
                        <div className="card">
                            <h2>Votos: {totalVotes}/{activePlayers.length}</h2>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{width:`${progress}%`}}>
                                    {progress > 20 && `${Math.round(progress)}%`}
                                </div>
                            </div>
                            {allVoted
                                ? <p style={{color:'#4caf50', textAlign:'center', fontWeight:'bold'}}>✓ Todos votaron</p>
                                : <p style={{color:'#666', textAlign:'center'}}>Faltan {activePlayers.length - totalVotes} voto(s)</p>
                            }
                        </div>

                        <div className="card">
                            <h2>Vota al Impostor</h2>
                            {activePlayers.map(([id, p]) => {
                                if (id === myPlayerId) return null;
                                const isMyVote = myVote === id;
                                const voteCount = voteCounts[id] || 0;
                                const hasVoted = !!room.votes?.[myPlayerId];
                                return (
                                    <div
                                        key={id}
                                        className={`vote-card vote-option${isMyVote ? ' my-vote' : ''}`}
                                        onClick={!hasVoted || isMyVote ? () => handleVote(id) : undefined}
                                        style={{opacity: hasVoted && !isMyVote ? 0.65 : 1, cursor: hasVoted && !isMyVote ? 'default' : 'pointer'}}
                                    >
                                        <div className="participant-info">
                                            <div className="avatar" style={{background: avatarColor(p.name)}}>{p.name.charAt(0)}</div>
                                            <span className="participant-name">{p.name}</span>
                                        </div>
                                        <div className="vote-actions">
                                            {voteCount > 0 && <div className="vote-count-badge">{voteCount}</div>}
                                            {isMyVote && <span style={{fontSize:'1.2em', marginLeft:4}}>✓</span>}
                                        </div>
                                    </div>
                                );
                            })}
                            <p style={{fontSize:'0.8em', color:'#aaa', marginTop:10, textAlign:'center'}}>
                                Toca un jugador para votar. Puedes cambiar tu voto.
                            </p>
                        </div>

                        {isAdmin && allVoted && toEliminate.length > 0 && (
                            <div className="card">
                                <h2>Confirmar Eliminación</h2>
                                {toEliminate.map(id => (
                                    <div key={id} style={{display:'flex', alignItems:'center', gap:10, padding:'10px 14px', background:'rgba(245,87,108,0.1)', borderRadius:12, marginBottom:8}}>
                                        <div className="avatar" style={{background: avatarColor(players[id]?.name||'')}}>{players[id]?.name?.charAt(0)}</div>
                                        <span style={{fontWeight:700, color:'#f5576c', flex:1}}>{players[id]?.name}</span>
                                        <span style={{fontSize:'0.82em', color:'#999'}}>{voteCounts[id]} voto{voteCounts[id]>1?'s':''}</span>
                                    </div>
                                ))}
                                <button className="btn btn-secondary" onClick={() => fbConfirmElimination(roomCode, room, toEliminate)}>
                                    Confirmar Eliminación
                                </button>
                            </div>
                        )}
                        {isAdmin && !allVoted && (
                            <p style={{textAlign:'center', color:'rgba(255,255,255,0.65)', marginTop:10, fontSize:'0.88em'}}>
                                Esperando que todos voten...
                            </p>
                        )}
                    </div>
                );
            };

            const renderEnded = () => {
                const players = Object.entries(room.players || {});
                return (
                    <div className="screen">
                        <div className="confetti-container">
                            {confettiPieces.map((p, i) => (
                                <div key={i} className="confetti-piece" style={{left:p.left, background:p.color, width:p.width, height:p.height, borderRadius:p.borderRadius, animationDelay:p.delay, animationDuration:p.duration}} />
                            ))}
                        </div>
                        <div className="winner-screen">
                            <div className="winner-emoji">{room.winner === 'innocents' ? '🎉' : '😈'}</div>
                            <div className="winner-title">
                                {room.winner === 'innocents' ? '¡Ganan los Inocentes!' : '¡Ganan los Impostores!'}
                            </div>
                            <div className="final-word">La palabra era: <strong>{room.secretWord}</strong></div>
                            <div className="card">
                                <h2>Revelación Final</h2>
                                {players.map(([id, p]) => (
                                    <div key={id} className={`player-role-item ${p.isImpostor ? 'impostor' : 'innocent'}`}>
                                        <div style={{display:'flex', alignItems:'center', gap:10}}>
                                            <div className="avatar" style={{background:'rgba(255,255,255,0.3)', fontSize:'0.85em'}}>{p.name.charAt(0)}</div>
                                            <span>{p.name}{id === myPlayerId ? ' (tú)' : ''}</span>
                                        </div>
                                        <span>{p.isImpostor ? '😈 IMPOSTOR' : '😇 INOCENTE'}</span>
                                    </div>
                                ))}
                            </div>
                            {isAdmin
                                ? <button className="btn btn-primary" onClick={() => db.ref(`rooms/${roomCode}/status`).set('lobby')}>🔄 Nueva Ronda</button>
                                : <div className="online-waiting-box" style={{marginTop:15}}><span className="pulse-dot" />Esperando decisión del admin...</div>
                            }
                            <button className="btn btn-outline" style={{marginTop:10}} onClick={handleLeave}>Salir de la sala</button>
                        </div>
                    </div>
                );
            };

            /* Loading state while connecting */
            if (roomCode && !room) {
                return (
                    <div className="app-container">
                        <div className="screen" style={{display:'flex', justifyContent:'center', alignItems:'center', flexDirection:'column', gap:16}}>
                            <div style={{fontSize:'2em'}}>⏳</div>
                            <p style={{color:'white', fontWeight:600}}>Conectando a la sala...</p>
                        </div>
                    </div>
                );
            }

            /* In a room — drive UI from Firebase status */
            if (roomCode && room) {
                const renderMap = { lobby: renderLobby, revealing: renderReveal, playing: renderPlaying, voting: renderVoting, ended: renderEnded };
                const renderFn = renderMap[room.status] || renderLobby;
                return <div className="app-container">{renderFn()}</div>;
            }

            /* Home — create or join */
            return (
                <div className="app-container">
                    <div className="screen">
                        <div className="header">
                            <h1>🌐 Modo Online</h1>
                            <p>Cada jugador en su propio celular</p>
                        </div>

                        <div className="card">
                            <h2>Crear Sala</h2>
                            <p style={{color:'#666', fontSize:'0.88em', marginBottom:14}}>Serás el administrador de la partida</p>
                            <div style={{textAlign:'center', marginBottom:16}}>
                                <div style={{fontSize:'0.72em', color:'#999', fontWeight:600, letterSpacing:1, textTransform:'uppercase', marginBottom:6}}>Código de sala</div>
                                <div style={{
                                    fontSize:'2em', fontWeight:900, letterSpacing:10, color:'#667eea',
                                    background:'#f0f0ff', borderRadius:12, padding:'10px 20px',
                                    display:'inline-block', fontVariantNumeric:'tabular-nums'
                                }}>{proposedCode}</div>
                                <div style={{fontSize:'0.75em', color:'#aaa', marginTop:6}}>Comparte este código mientras llenas tu nombre</div>
                            </div>
                            <div className="input-group">
                                <input type="text" placeholder="Tu nombre" value={playerName}
                                    onChange={e => { setPlayerName(e.target.value); setError(''); }}
                                    onKeyPress={e => e.key === 'Enter' && handleCreate()} />
                            </div>
                            {error && <p style={{color:'#f5576c', marginBottom:8, fontSize:'0.88em'}}>{error}</p>}
                            <button className="btn btn-secondary" onClick={handleCreate} disabled={loading || !playerName.trim()}>
                                {loading ? 'Creando...' : '➕ Crear Sala'}
                            </button>
                        </div>

                        <div style={{textAlign:'center', color:'rgba(255,255,255,0.55)', margin:'6px 0', fontWeight:700, fontSize:'0.9em'}}>— o —</div>

                        <div className="card">
                            <h2>Unirse a Sala</h2>
                            <p style={{color:'#666', fontSize:'0.88em', marginBottom:14}}>Ingresa el código que te compartió el admin</p>
                            <div className="input-group">
                                <input type="text" placeholder="Tu nombre" value={playerName}
                                    onChange={e => { setPlayerName(e.target.value); setError(''); }} />
                            </div>
                            <div className="input-group">
                                <input type="text" placeholder="Código de sala (ej: ABCDE)"
                                    value={inputCode}
                                    onChange={e => { setInputCode(e.target.value.toUpperCase()); setError(''); }}
                                    onKeyPress={e => e.key === 'Enter' && handleJoin()}
                                    style={{textTransform:'uppercase', letterSpacing:6, fontWeight:700, textAlign:'center'}} />
                            </div>
                            {error && <p style={{color:'#f5576c', marginBottom:8, fontSize:'0.88em'}}>{error}</p>}
                            <button className="btn btn-primary" onClick={handleJoin} disabled={loading || !playerName.trim() || !inputCode.trim()}>
                                {loading ? 'Uniéndose...' : '🚪 Unirse'}
                            </button>
                        </div>

                        <button className="btn btn-outline" style={{marginTop:10}} onClick={onExit}>
                            ← Volver al Menú
                        </button>
                    </div>
                </div>
            );
        }

        /* ══════════════════════════════════════
           ROOT APP — choose local vs online
        ══════════════════════════════════════ */
        function App() {
            const [mode, setMode] = useState('home');
            if (mode === 'local')  return <ImpostorGame />;
            if (mode === 'online') return <OnlineGame onExit={() => setMode('home')} />;
            return (
                <div className="app-container">
                    <div className="screen">
                        <div className="header">
                            <h1>🎭 El Impostor</h1>
                            <p>El juego de la deducción</p>
                        </div>
                        <div style={{marginTop:24}}>
                            <div className="card" style={{marginBottom:12}}>
                                <button className="btn btn-primary" style={{marginTop:0}} onClick={() => setMode('local')}>
                                    📱 Modo Local
                                    <small style={{display:'block', fontWeight:400, opacity:0.65, fontSize:'0.72em', marginTop:4}}>
                                        Todos en el mismo dispositivo — se pasa el celular
                                    </small>
                                </button>
                            </div>
                            <div className="card">
                                <button className="btn btn-secondary" style={{marginTop:0}} onClick={() => setMode('online')}>
                                    🌐 Modo Online
                                    <small style={{display:'block', fontWeight:400, opacity:0.85, fontSize:'0.72em', marginTop:4}}>
                                        Cada jugador en su propio celular en tiempo real
                                    </small>
                                </button>
                            </div>
                        </div>
                        <div className="footer">
                            <div className="footer-content">
                                <div className="footer-title">App desarrollada por Ing. José Armando Navarrete</div>
                                <div className="footer-email">
                                    <a href="mailto:jnavarretejimenez98@gmail.com">jnavarretejimenez98@gmail.com</a>
                                </div>
                                <div className="footer-year">© 2025 - Todos los derechos reservados</div>
                                    <div className="footer-year" style={{marginTop: '6px'}}>
                                        <a href="/privacidad.html" style={{color: '#fff', opacity: 0.8, textDecoration: 'underline'}}>Política de Privacidad</a>
                                    </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
